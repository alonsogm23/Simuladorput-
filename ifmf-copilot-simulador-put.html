const CASOS=[{id:'caso1',titulo:'Protección ante caída del mercado',descripcion:'Tienes acciones y temes una caída. Observa cómo la PUT actúa como seguro financiero.',dificultad:'Básico',modo:'especulativa',icono:Shield,color:tokens.profit,valores:{S0:100,K:95,prima:4,T:90,contratos:1,nAcciones:100,S0Compra:100,ST:85,Tslider:90},sugerencia:'Mueve el "Precio al vencimiento (S_T)" entre 70 € y 110 € y observa cómo cambia la línea verde (cartera cubierta).',objetivos:['Cobertura','Suelo de pérdidas','Protección financiera'],tour:[{target:'panel-variables',titulo:'1. Tu situación de partida',texto:'Tienes 100 acciones compradas a 100 € cada una. Total invertido: 10.000 €. Compras 1 PUT con E = 95 € pagando una prima P = 4 €/acción → P total = 400 € (4 × 100).',pos:'right'},{target:'panel-explorar',titulo:'2. Imagina que el mercado cae',texto:'Mueve el slider azul "Precio al vencimiento" hacia la izquierda, hasta 80 €. Verás cómo cambia tu P/L total en tiempo real.',pos:'right',accion:{setter:'setST',valor:80}},{target:'grafico-payoff',titulo:'3. El efecto seguro',texto:'Fíjate en la línea verde (cartera cubierta): por debajo de E = 95 €, deja de bajar. Ese es tu "suelo" de pérdidas. Sin la PUT (línea gris punteada), seguirías perdiendo.',pos:'left'},{target:'metricas',titulo:'4. Tu pérdida máxima',texto:'Mira el "Suelo cartera cubierta": sea cual sea la caída, no perderás más que esta cantidad. Es el coste real del seguro: la franquicia (caída de S hasta E) + la prima P.',pos:'left'},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'Una PUT como cobertura no elimina las pérdidas pequeñas, pero te protege de las catastróficas. Igual que el seguro del coche: tienes franquicia, pero te cubre el desastre.',pos:'top'}]},{id:'caso2',titulo:'El mercado se desploma',descripcion:'Crees que el mercado caerá bruscamente y compras una PUT para beneficiarte.',dificultad:'Básico',modo:'especulativa',icono:TrendingDown,color:tokens.loss,valores:{S0:100,K:100,prima:5,T:60,contratos:1,nAcciones:100,S0Compra:100,ST:80,Tslider:60},sugerencia:'Lleva el "Precio al vencimiento (S_T)" a valores bajos (70-85 €) y observa cómo crece el beneficio.',objetivos:['Payoff bajista','Beneficio creciente','Pérdida limitada'],tour:[{target:'panel-variables',titulo:'1. Tu apuesta',texto:'No tienes acciones. Compras 1 PUT con E = 100 € y P = 5 €. Ganarás si S_T < E − P = 95 €. Por debajo de ahí: B/P = max(0, E − S_T) − P > 0.',pos:'right'},{target:'panel-explorar',titulo:'2. Mueve el precio hacia abajo',texto:'Lleva el slider de S_T desde 100 € hacia 80 €. Mira cómo el P/L pasa de negativo (pierdes la prima P) a positivo: max(0, E − S_T) − P > 0.',pos:'right'},{target:'grafico-payoff',titulo:'3. Forma de "L" invertida',texto:'Esta es la firma visual de una PUT comprada: cuanto más cae el precio, más ganas. Pero si el precio sube, tu pérdida está limitada a la prima P (línea horizontal a la derecha de E).',pos:'left'},{target:'metricas',titulo:'4. El apalancamiento',texto:'Con solo 500 € controlas el efecto de 100 acciones. Si las acciones caen un 20%, ganas mucho más que el 20% sobre tu inversión. Eso es apalancamiento.',pos:'left'},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'Comprar una PUT permite ganar con caídas sin tener que vender en corto. Pérdida limitada a P, beneficio potencialmente grande cuando S cae.',pos:'top'}]},{id:'caso3',titulo:'La PUT tiene valor, pero aún pierdes',descripcion:'El mercado cae ligeramente, pero no lo suficiente para que max(0, E − S_T) supere la prima P.',dificultad:'Intermedio',modo:'especulativa',icono:AlertCircle,color:tokens.strike,valores:{S0:100,K:100,prima:5,T:30,contratos:1,nAcciones:100,S0Compra:100,ST:97,Tslider:30},sugerencia:'Observa la fila de la tabla resaltada en azul. La PUT tiene valor intrínseco max(0, E − S_T) = 3 € pero la prima P fue 5 €. Mueve S_T para encontrar el punto exacto donde dejas de perder.',objetivos:['Diferencia entre tener razón y ganar dinero','Impacto de la prima P','Break-even'],tour:[{target:'panel-explorar',titulo:'1. Tenías razón... pero no del todo',texto:'El precio cayó de 100 € a 97 €. La PUT vale max(0, E − S_T) = max(0, 100 − 97) = 3 €. Pero pagaste P = 5 €. B/P = 3 − 5 = −2 €/acción → −200 € por contrato.',pos:'right'},{target:'tabla-escenarios',titulo:'2. Mira la tabla',texto:'La columna "V. intrín." muestra el valor que tiene la PUT al ejercerla. La columna "P/L total" muestra que aún restando P, sigues en pérdidas. Solo cuando S_T < E − P = 95 € compensas el coste.',pos:'left'},{target:'grafico-payoff',titulo:'3. El break-even',texto:'La línea punteada blanca marca el break-even: el precio exacto donde tu P/L = 0. Break-even = E − P = 100 − 5 = 95 €. Con cualquier S_T < 95 €: B/P > 0.',pos:'left'},{target:'panel-explorar',titulo:'4. Encuentra el equilibrio',texto:'Mueve S_T hasta 95 €. Verás P/L = 0 €. Ahí está el límite: tener razón en la dirección no basta: S tiene que caer lo suficiente para cubrir la prima P.',pos:'right',accion:{setter:'setST',valor:95}},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'En opciones, predecir la dirección es solo la mitad del juego. La otra mitad es predecir la magnitud: la prima P determina el umbral de rentabilidad: B/P PUT = max(0, E − S_T) − P > 0 solo si S_T < E − P.',pos:'top'}]},{id:'caso4',titulo:'La PUT expira sin valor',descripcion:'El mercado sube y la PUT pierde toda la prima P pagada.',dificultad:'Básico',modo:'especulativa',icono:Target,color:tokens.textSecondary,valores:{S0:100,K:95,prima:4,T:45,contratos:1,nAcciones:100,S0Compra:100,ST:120,Tslider:45},sugerencia:'Tu pérdida es exactamente P × 100 = 400 €. Mueve S_T entre E+1 y 150 €: la pérdida no cambia. Es tu pérdida máxima.',objetivos:['Pérdida máxima limitada','Opción OTM','Seguro no utilizado'],tour:[{target:'panel-explorar',titulo:'1. Tu apuesta falló',texto:'Compraste una PUT esperando una caída. En lugar de caer, el precio subió a 120 €. La PUT está OTM (fuera del dinero): no vale nada al vencimiento.',pos:'right'},{target:'grafico-payoff',titulo:'2. La línea plana',texto:'Mira la línea de payoff a la derecha del precio de ejercicio (E): es horizontal, anclada en −400 € (= P × 100). Sube todo lo que quieras: max(0, E − S_T) = 0 y la pérdida = −P × 100. Eso es lo bonito de comprar opciones.',pos:'left'},{target:'panel-explorar',titulo:'3. Compruébalo',texto:'Mueve S_T entre 96 € y 150 €. P/L se mantiene constante en -400 €. Esa es tu pérdida máxima, hagas lo que haga el mercado.',pos:'right'},{target:'metricas',titulo:'4. Riesgo asimétrico',texto:'Pierdes máximo 400 €. Si en lugar de subir el precio hubiera caído mucho, habrías ganado miles. Pérdida acotada + beneficio potencialmente grande = el atractivo de comprar opciones.',pos:'left'},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'Comprar una PUT es como comprar un seguro contra caídas. Si no hay caída, "pierdes" el seguro. Pero al menos sabías exactamente cuánto te podía costar.',pos:'top'}]},{id:'caso5',titulo:'Desaparición del valor temporal',descripcion:'Observa cómo se evapora el valor temporal al acercarse el vencimiento.',dificultad:'Intermedio',modo:'especulativa',icono:Clock,color:tokens.accent,valores:{S0:100,K:100,prima:6,T:365,contratos:1,nAcciones:100,S0Compra:100,ST:100,Tslider:365},sugerencia:'Ve al segundo gráfico ("Valor de la opción antes del vencimiento") y mueve el slider "Tiempo" desde 365 días hacia 1 día.',objetivos:['Valor temporal','Convergencia al valor intrínseco','Efecto del tiempo'],tour:[{target:'grafico-valor',titulo:'1. Dos componentes del valor',texto:'Una opción tiene dos valores: el intrínseco (lo que valdría si venciera AHORA) y el temporal (valor extra por el tiempo que queda). La línea gris es el intrínseco, la azul es el total.',pos:'top'},{target:'slider-tiempo',titulo:'2. Mueve el tiempo',texto:'Arrastra el slider "Tiempo" desde 365 hasta 90. Verás cómo la curva azul se va aplastando hacia la gris. El valor temporal se está evaporando.',pos:'bottom'},{target:'slider-tiempo',titulo:'3. Cerca del vencimiento',texto:'Ahora llévalo a 30 días, luego a 10, luego a 1. La curva azul casi se funde con la gris. Al vencimiento, solo queda el valor intrínseco.',pos:'bottom'},{target:'grafico-valor',titulo:'4. ¿Dónde es máximo?',texto:'Observa que el valor temporal es máximo cerca del precio de ejercicio (E) (línea ámbar). Las opciones ATM tienen el mayor valor temporal. Las muy ITM u OTM tienen poco valor temporal.',pos:'top'},{target:'grafico-valor',titulo:'5. La lección clave',texto:'Comprar opciones es comprar tiempo. Cada día que pasa, tu opción vale menos (efecto theta), aunque el precio del subyacente no se mueva. Para el examen: el valor temporal SIEMPRE decae hacia 0.',pos:'top'}]},// ============ VENTA DE PUT — 3 CASOS ============
{id:'caso6',titulo:'Cobro de prima sin asignación',descripcion:'Vendes una PUT esperando que el subyacente no caiga. El comprador no ejerce y te quedas con la prima íntegra.',dificultad:'Básico',modo:'venta',icono:Coins,color:tokens.profit,valores:{S0:100,K:95,prima:4,T:60,contratos:1,nAcciones:100,S0Compra:100,ST:105,Tslider:60},sugerencia:'Mueve S_T entre 95 € y 130 €. Verás que tu B/P se mantiene constante en +P. Por encima de E, el comprador no ejerce: tu beneficio máximo está garantizado.',objetivos:['Beneficio máximo = P','OTM como mejor escenario','Asimetría vendedor'],tour:[{target:'panel-variables',titulo:'1. Tu posición como vendedor',texto:'Has vendido 1 PUT con E = 95 € y has cobrado P = 4 € por acción (400 € por contrato). A cambio, te obligas a comprar a 95 € si el comprador decide ejercer.',pos:'right'},{target:'panel-explorar',titulo:'2. El mercado sube a 105 €',texto:'S_T = 105 € > E = 95 €. ¿Ejercerá el comprador su derecho a vender a 95 € cuando el mercado paga 105 €? No, claro. La PUT vence OTM.',pos:'right'},{target:'grafico-payoff',titulo:'3. La línea horizontal',texto:'Fíjate en la curva: a la derecha de E es plana en +400 € (= P × 100). Hagas lo que hagas con S_T por encima de E, tu B/P es constante: te quedas con toda la prima.',pos:'left'},{target:'panel-explorar',titulo:'4. Compruébalo',texto:'Mueve S_T desde 95 € hasta 130 €. Verás que el P/L se mantiene en +400 €. Eso es lo bonito de vender opciones: si aciertas la dirección, cobras y olvidas.',pos:'right'},{target:'metricas',titulo:'5. La lección clave',texto:'Tu beneficio máximo está LIMITADO a la prima P. No importa si S sube a 105, 200 o 500: tu ganancia siempre será +P × 100 × contratos. Es la asimetría del vendedor.',pos:'left'}]},{id:'caso7',titulo:'Asignación con caída moderada',descripcion:'El mercado cae por debajo del strike. El comprador ejerce. Tú asumes la pérdida, pero la prima cobrada la amortigua.',dificultad:'Intermedio',modo:'venta',icono:AlertCircle,color:tokens.strike,valores:{S0:100,K:100,prima:5,T:45,contratos:1,nAcciones:100,S0Compra:100,ST:97,Tslider:45},sugerencia:'S_T = 97 €, E = 100 €. La PUT está ITM y el comprador ejerce. Pero como cobraste P = 5 €, todavía tienes B/P positivo. Mueve S_T hacia 95 € (break-even) y luego más abajo.',objetivos:['Asignación ITM','Prima amortigua la pérdida','Break-even simétrico'],tour:[{target:'panel-explorar',titulo:'1. El precio cae a 97 €',texto:'S_T = 97 € < E = 100 €. El comprador ejerce su derecho a venderte acciones a 100 € cuando el mercado solo paga 97 €. Estás OBLIGADO a comprar.',pos:'right'},{target:'tabla-escenarios',titulo:'2. Mira la columna "¿Se ejercita?"',texto:'En las filas donde S_T < E, la columna marca "Sí". Como vendedor, no decides tú: respondes a la decisión del comprador. Solo te queda calcular cuánto pierdes (o ganas).',pos:'left'},{target:'panel-explorar',titulo:'3. ¿Pero estás en pérdida?',texto:'Has pagado 100 € por acción que vale 97 €: pierdes 3 € por acción. PERO cobraste P = 5 €. B/P = 5 − 3 = +2 €/acción → +200 €. Aún ganas, gracias a la prima.',pos:'right'},{target:'grafico-payoff',titulo:'4. El break-even',texto:'La línea punteada marca BE = E − P = 95 €. A la derecha de BE estás en beneficio. A la izquierda, en pérdida. Es exactamente el mismo break-even que el comprador, pero al otro lado.',pos:'left'},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'La prima cobrada te da un "colchón" de P euros. Pierdes solo si la caída del subyacente supera ese colchón. Por eso vendedores experimentados venden PUTs OTM con primas modestas.',pos:'top'}]},{id:'caso8',titulo:'Caída fuerte: pérdida grande',descripcion:'El subyacente se desploma. El comprador ejerce y tú asumes una pérdida muy superior a la prima cobrada.',dificultad:'Intermedio',modo:'venta',icono:TrendingDown,color:tokens.loss,valores:{S0:100,K:100,prima:5,T:30,contratos:1,nAcciones:100,S0Compra:100,ST:75,Tslider:30},sugerencia:'S_T = 75 €, E = 100 €. La pérdida supera ampliamente la prima. Mueve S_T hacia 50 € y observa cómo crece la pérdida casi sin límite. Esa es la gran asimetría del vendedor.',objetivos:['Pérdida casi ilimitada','Asimetría riesgo/beneficio','Riesgo del vendedor'],tour:[{target:'panel-explorar',titulo:'1. Catástrofe en el mercado',texto:'S_T = 75 € << E = 100 €. La PUT está muy ITM. El comprador ejerce: te obliga a comprar acciones a 100 € cuando valen 75 €. Pérdida en el ejercicio: 25 €/acción.',pos:'right'},{target:'panel-explorar',titulo:'2. La prima no salva nada',texto:'Cobraste P = 5 €. B/P = 5 − 25 = −20 €/acción → −2.000 € por contrato. La prima amortigua pero no protege contra movimientos grandes.',pos:'right'},{target:'grafico-payoff',titulo:'3. La curva descendente',texto:'Mira la línea a la izquierda del strike: cae con pendiente -1, sin suelo hasta que S = 0. En el límite, pierdes (E − P) × 100 = 9.500 € por contrato. La prima cobrada parece pequeña frente a esto.',pos:'left'},{target:'metricas',titulo:'4. La asimetría brutal',texto:'Beneficio máximo: +500 €. Pérdida máxima: -9.500 €. Vender PUTs es como vender seguros: cobras pequeñas primas regulares, pero el "siniestro" puede ser devastador.',pos:'left'},{target:'panel-interpretacion',titulo:'5. La lección clave',texto:'Vender PUTs sin cobertura ("naked put") es estrategia de alto riesgo. En el examen recuerda: vendedor de PUT = beneficio limitado a P, pérdida casi ilimitada. Profesionales lo combinan con otras posiciones.',pos:'top'}]}];// ============================================================
